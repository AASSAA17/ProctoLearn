---
- name: Ensure project root exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    mode: '0755'
  become: true

- name: Install git
  ansible.builtin.apt:
    name: git
    state: present
    update_cache: true
  become: true

- name: Checkout project repository
  ansible.builtin.git:
    repo: "{{ repo_url }}"
    dest: "{{ project_root }}"
    version: "{{ repo_branch }}"
    force: true
  become: true

- name: Ensure root .env exists
  ansible.builtin.copy:
    src: "{{ project_root }}/.env.example"
    dest: "{{ project_root }}/.env"
    remote_src: true
    force: false
    mode: '0600'
  become: true

- name: Ensure monitoring .env exists
  ansible.builtin.copy:
    src: "{{ project_root }}/monitoring-project/.env.example"
    dest: "{{ project_root }}/monitoring-project/.env"
    remote_src: true
    force: false
    mode: '0600'
  become: true

- name: Start application stack
  ansible.builtin.command:
    cmd: docker compose -f {{ compose_file }} up -d --build
    chdir: "{{ project_root }}"
  become: true

- name: Start monitoring stack
  ansible.builtin.command:
    cmd: docker compose -f {{ monitoring_compose_file }} up -d --build
    chdir: "{{ project_root }}"
  become: true

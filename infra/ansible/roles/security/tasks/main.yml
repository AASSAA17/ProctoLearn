---
- name: Install security packages
  ansible.builtin.apt:
    name:
      - openssh-server
      - ufw
      - fail2ban
    state: present
    update_cache: true
  become: true

- name: Install managed SSH hardening config
  ansible.builtin.template:
    src: sshd-hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-proctolearn-hardening.conf
    mode: '0644'
  become: true

- name: Validate SSH configuration
  ansible.builtin.command: sshd -t
  changed_when: false
  become: true

- name: Restart and enable SSH service
  ansible.builtin.service:
    name: ssh
    state: restarted
    enabled: true
  become: true

- name: Ensure required UFW ports are allowed before enabling firewall
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
  loop: "{{ ufw_allowed_ports }}"
  become: true

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    policy: deny
  become: true

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    policy: allow
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: true

- name: Install managed Fail2Ban jail configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    mode: '0644'
  become: true

- name: Ensure fail2ban is enabled and running
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  become: true

- name: Collect SSH effective settings for audit
  ansible.builtin.shell: |
    set -o pipefail
    sshd -T | grep -E '^(port|passwordauthentication|permitrootlogin|pubkeyauthentication) '
  args:
    executable: /bin/bash
  register: ssh_audit
  changed_when: false
  become: true

- name: Collect UFW status for audit
  ansible.builtin.command: ufw status verbose
  register: ufw_audit
  changed_when: false
  become: true

- name: Collect Fail2Ban summary for audit
  ansible.builtin.command: fail2ban-client status
  register: fail2ban_summary
  changed_when: false
  become: true

- name: Collect Fail2Ban SSH jail status for audit
  ansible.builtin.command: fail2ban-client status sshd
  register: fail2ban_sshd
  changed_when: false
  become: true

- name: Write security audit report on target
  ansible.builtin.copy:
    dest: /var/log/proctolearn-security-audit.txt
    mode: '0644'
    content: |
      ProctoLearn Security Audit Report
      Generated by Ansible role: security

      [SSH Effective Settings]
      {{ ssh_audit.stdout | default('n/a') }}

      [UFW Status]
      {{ ufw_audit.stdout | default('n/a') }}

      [Fail2Ban Summary]
      {{ fail2ban_summary.stdout | default('n/a') }}

      [Fail2Ban sshd Jail]
      {{ fail2ban_sshd.stdout | default('n/a') }}
  become: true

---
# Local demonstration playbook - runs on localhost without a VM
# Use this to demonstrate Ansible capabilities when VM is not available
- name: Configure and deploy ProctoLearn infrastructure (local mode)
  hosts: proctolearn
  gather_facts: true
  become: true

  vars:
    ansible_become_password: "{{ lookup('env', 'BECOME_PASS') | default(omit) }}"

  tasks:
    - name: Gather system facts
      ansible.builtin.setup:
        gather_subset:
          - hardware
          - network
          - virtual

    - name: Show OS information
      ansible.builtin.debug:
        msg: |
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Architecture: {{ ansible_architecture }}
          Hostname: {{ ansible_hostname }}
          CPU: {{ ansible_processor_count }} cores
          RAM: {{ (ansible_memtotal_mb / 1024) | round(1) }} GB

    - name: Check Docker is installed
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version
      ansible.builtin.debug:
        msg: "Docker: {{ docker_version.stdout }}"

    - name: Check Docker Compose is available
      ansible.builtin.command: docker compose version
      register: compose_version
      changed_when: false

    - name: Show Docker Compose version
      ansible.builtin.debug:
        msg: "Docker Compose: {{ compose_version.stdout }}"

    - name: Check running containers
      ansible.builtin.shell: docker ps --format "table {% raw %}{{.Names}}\t{{.Status}}{% endraw %}"
      register: running_containers
      changed_when: false

    - name: Show running containers
      ansible.builtin.debug:
        msg: "{{ running_containers.stdout_lines }}"

    - name: Check Terraform is installed
      ansible.builtin.command: terraform version
      register: terraform_version
      changed_when: false
      failed_when: false

    - name: Show Terraform version
      ansible.builtin.debug:
        msg: "Terraform: {{ terraform_version.stdout_lines[0] | default('Not installed') }}"

    - name: Verify project directory exists
      ansible.builtin.stat:
        path: /home/arsen/IdeaProjects/ProctoLearn
      register: project_dir

    - name: Show project status
      ansible.builtin.debug:
        msg: "ProctoLearn project directory exists: {{ project_dir.stat.exists }}"

    - name: Check UFW status
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false
      failed_when: false
      become: true

    - name: Show UFW status
      ansible.builtin.debug:
        msg: "UFW: {{ ufw_status.stdout_lines | default(['not available']) }}"

    - name: Check Fail2Ban status
      ansible.builtin.command: fail2ban-client status
      register: f2b_status
      changed_when: false
      failed_when: false
      become: true

    - name: Show Fail2Ban status
      ansible.builtin.debug:
        msg: "Fail2Ban: {{ f2b_status.stdout_lines | default(['not available']) }}"

    - name: Write infrastructure audit report
      ansible.builtin.copy:
        dest: /tmp/proctolearn-infra-audit.txt
        mode: '0644'
        content: |
          ProctoLearn Infrastructure Audit
          Generated by Ansible playbook-local.yml
          Date: {{ ansible_date_time.iso8601 }}

          [System]
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Hostname: {{ ansible_hostname }}

          [Docker]
          {{ docker_version.stdout }}
          {{ compose_version.stdout }}

          [Running Containers]
          {{ running_containers.stdout }}

          [Terraform]
          {{ terraform_version.stdout_lines[0] | default('Not installed') }}

          [Project]
          ProctoLearn directory: {{ project_dir.stat.exists }}
      become: false


